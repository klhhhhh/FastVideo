# Self-forcing distillation: Matrix-Game 2.0 I2V Causal
#
# - Teacher: frozen pretrained Matrix-Game 2.0 model
# - Student: trainable causal Matrix-Game 2.0 model
# - Critic:  trainable Matrix-Game 2.0 model
# - Training: streaming rollout with SDE sampling

models:
  student:
    _target_: fastvideo.train.models.matrixgame2.matrixgame2_causal.MatrixGame2CausalModel
    init_from: FastVideo/Matrix-Game-2.0-Base-Distilled-Diffusers
    trainable: true
  teacher:
    _target_: fastvideo.train.models.matrixgame2.matrixgame2.MatrixGame2Model
    init_from: FastVideo/Matrix-Game-2.0-Base-Diffusers
    trainable: false
    disable_custom_init_weights: true
  critic:
    _target_: fastvideo.train.models.matrixgame2.matrixgame2.MatrixGame2Model
    init_from: FastVideo/Matrix-Game-2.0-Base-Diffusers
    trainable: true
    disable_custom_init_weights: true

method:
  _target_: fastvideo.train.methods.distribution_matching.self_forcing.SelfForcingMethod
  rollout_mode: simulate
  generator_update_interval: 5
  real_score_guidance_scale: 4.5
  dmd_denoising_steps: [1000, 750, 500, 250]

  chunk_size: 3
  student_sample_type: sde
  context_noise: 0.0
  enable_gradient_in_rollout: true
  start_gradient_frame: 0

  # Critic optimizer
  fake_score_learning_rate: 8.0e-6
  fake_score_betas: [0.0, 0.999]
  fake_score_lr_scheduler: constant

training:
  distributed:
    num_gpus: 4
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 4

  data:
    data_path: data/matrixgame2
    dataloader_num_workers: 4
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 1000
    num_latent_t: 21
    num_height: 352
    num_width: 640
    num_frames: 81

  optimizer:
    learning_rate: 1.0e-5
    betas: [0.0, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 1
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: outputs/matrixgame2_causal_self_forcing
    training_state_checkpointing_steps: 1000
    checkpoints_total_limit: 3

  tracker:
    project_name: self-forcing-matrixgame2
    run_name: matrixgame2_causal_self_forcing

  model:
    enable_gradient_checkpointing_type: full

callbacks:
  ema:
    decay: 0.99
    start_iter: 200
  grad_clip:
    max_grad_norm: 1.0
  validation:
    pipeline_target: fastvideo.pipelines.basic.matrixgame2.matrixgame2_causal_dmd_pipeline.MatrixGame2CausalDMDPipeline
    dataset_file: examples/distill/MatrixGame2.0/validation.json
    every_steps: 50
    sampling_steps: [4]
    sampling_timesteps: [1000, 750, 500, 250]
    num_frames: 81
    guidance_scale: 6.0

pipeline:
  flow_shift: 5
