# Self-Forcing distillation: Wan 2.1 T2V 1.3B Causal
#
# - Teacher: frozen pretrained Wan 2.1 T2V 1.3B
# - Student: trainable causal Wan model
# - Critic:  trainable, initialized from pretrained weights
# - Training: streaming rollout with SDE sampling

models:
  student:
    _target_: fastvideo.train.models.wan.WanCausalModel
    init_from: wlsaidhi/SFWan2.1-T2V-1.3B-Diffusers
    trainable: true
    transformer_override_safetensor: /mnt/weka/home/hao.zhang/wl/Self-Forcing/diffusers_ode_init/model.safetensors
  teacher:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-14B-Diffusers
    trainable: false
    disable_custom_init_weights: true
  critic:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: true
    disable_custom_init_weights: true

method:
  _target_: fastvideo.train.methods.distribution_matching.self_forcing.SelfForcingMethod
  rollout_mode: simulate
  generator_update_interval: 5
  # Clean uses standard CFG for DMD real score:
  # uncond + scale * (cond - uncond). Self-Forcing training uses
  # cond + 3.0 * (cond - uncond), so 4.0 matches its guidance_scale=3.0.
  real_score_guidance_scale: 4.0
  dmd_denoising_steps: [1000, 750, 500, 250]
  warp_denoising_step: true

  chunk_size: 3
  student_sample_type: sde
  context_noise: 0.0
  same_step_across_blocks: true
  enable_gradient_in_rollout: true
  start_gradient_frame: 0

  # Critic optimizer
  fake_score_learning_rate: 4.0e-7
  fake_score_betas: [0.0, 0.999]
  fake_score_lr_scheduler: constant

training:
  distributed:
    num_gpus: 8
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 8

  data:
    data_path: data/vidprom_16k_umt5_text_embed
    dataloader_num_workers: 4
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 1000
    num_latent_t: 21
    num_height: 480
    num_width: 832
    num_frames: 81

  optimizer:
    learning_rate: 2.0e-6
    betas: [0.0, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 4000
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: outputs/wan2.1_causal_self_forcing
    training_state_checkpointing_steps: 1000
    checkpoints_total_limit: 3

  tracker:
    project_name: self-forcing-wan
    run_name: wan2.1_causal_self_forcing

  model:
    enable_gradient_checkpointing_type: full

callbacks:
  ema:
    decay: 0.99
    start_iter: 200
  grad_clip:
    max_grad_norm: 1.0
  validation:
    pipeline_target: fastvideo.pipelines.basic.wan.wan_causal_dmd_pipeline.WanCausalDMDPipeline
    dataset_file: examples/training/finetune/Wan2.1-VSA/Wan-Syn-Data/validation_4.json
    every_steps: 50
    sampling_steps: [4]
    sampling_timesteps: [1000, 750, 500, 250]
    num_frames: 81
    # Validation/inference uses standard CFG in both clean and Self-Forcing,
    # so this directly matches Self-Forcing guidance_scale=3.0.
    guidance_scale: 3.0

pipeline:
  flow_shift: 5
  dit_config:
    # Use a positive local_attn_size for validation videos longer than
    # 81 frames, otherwise the full-cache path can exceed the allocated KV cache.
    # local_attn_size includes sink latents, e.g. 12 = 3 sink + 9 rolling window.
    local_attn_size: -1
    sink_size: 0
