# Wan 2.1 T2V 1.3B finetune.

models:
  student:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: true

method:
  _target_: fastvideo.train.methods.fine_tuning.finetune.FineTuneMethod

training:
  distributed:
    num_gpus: 2
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 2
    hsdp_shard_dim: 1

  data:
    data_path: data/preprocessed
    dataloader_num_workers: 4
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 1000
    num_latent_t: 20
    num_height: 448
    num_width: 832
    num_frames: 77

  optimizer:
    learning_rate: 1.0e-6
    betas: [0.9, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 4000
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: outputs/wan_finetune
    training_state_checkpointing_steps: 100
    checkpoints_total_limit: 3
    resume_from_checkpoint: latest

  tracker:
    project_name: fastvideo
    run_name: wan_finetune

  model:
    enable_gradient_checkpointing_type: full
    enable_activation_offloading: true
    activation_offloading_min_tensor_size_mb: 1

callbacks:
  grad_clip:
    _target_: fastvideo.train.callbacks.grad_clip.GradNormClipCallback
    max_grad_norm: 1.0
  validation:
    _target_: fastvideo.train.callbacks.validation.ValidationCallback
    pipeline_target: fastvideo.pipelines.basic.wan.wan_pipeline.WanPipeline
    dataset_file: data/validation_prompts.json
    every_steps: 100
    sampling_steps: [50]
    guidance_scale: 5.0

pipeline:
  flow_shift: 3
