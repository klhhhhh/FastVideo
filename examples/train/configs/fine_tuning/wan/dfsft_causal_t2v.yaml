# DFSFT (Diffusion-Forcing SFT): Wan 2.1 T2V 1.3B Causal
#
# - Student: trainable causal Wan model
# - Training: inhomogeneous timesteps per chunk (diffusion forcing)

models:
  student:
    _target_: fastvideo.train.models.wan.WanCausalModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: true

method:
  _target_: fastvideo.train.methods.fine_tuning.dfsft.DiffusionForcingSFTMethod
  chunk_size: 3

training:
  distributed:
    num_gpus: 8
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 8

  data:
    data_path: data/Wan-Syn_77x448x832_600k
    dataloader_num_workers: 4
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 1000
    num_latent_t: 18
    num_height: 448
    num_width: 832
    num_frames: 69

  optimizer:
    learning_rate: 2.0e-6
    betas: [0.9, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 4000
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: outputs/wan2.1_causal_dfsft
    training_state_checkpointing_steps: 1000
    checkpoints_total_limit: 3

  tracker:
    project_name: distillation_wan_r
    run_name: wan2.1_causal_dfsft_shift5_gauss_weight

  model:
    enable_gradient_checkpointing_type: full

callbacks:
  grad_clip:
    max_grad_norm: 1.0
  validation:
    pipeline_target: fastvideo.pipelines.basic.wan.wan_causal_pipeline.WanCausalPipeline
    dataset_file: examples/training/finetune/Wan2.1-VSA/Wan-Syn-Data/validation_4.json
    every_steps: 50
    sampling_steps: [40]
    guidance_scale: 6.0
    num_frames: 69

pipeline:
  flow_shift: 5
