# TurboWan 2.1 T2V 1.3B LoRA finetune with SLA attention.
#
# Notes:
# - TurboDiffusion checkpoints expect the SLA attention backend. The training
#   entrypoint now auto-selects `SLA_ATTN` for model IDs containing
#   `turbodiffusion` or `turbowan`, unless you override the environment
#   variable manually.
# - This debug config reuses the existing crush-smol T2V parquet recipe. If you
#   preprocess data with the official TurboWan recipe, update the temporal and
#   spatial fields to match it.

models:
  student:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: loayrashid/TurboWan2.1-T2V-1.3B-Diffusers
    trainable: true
    lora:
      enable: true
      rank: 16
      alpha: 32
      target_modules:
        - to_q
        - to_k
        - to_v
        - to_out

method:
  _target_: fastvideo.train.methods.fine_tuning.finetune.FineTuneMethod

training:
  dit_precision: bf16

  distributed:
    num_gpus: 1
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 1

  data:
    data_path: data/crush-smol_processed_t2v/combined_parquet_dataset
    dataloader_num_workers: 2
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 42
    num_latent_t: 20
    num_height: 480
    num_width: 832
    num_frames: 77

  optimizer:
    learning_rate: 1.0e-5
    betas: [0.9, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 10
    gradient_accumulation_steps: 5

  checkpoint:
    output_dir: outputs/turbo_wan_t2v_lora_sla
    training_state_checkpointing_steps: 5
    checkpoints_total_limit: 2
    resume_from_checkpoint: null

  tracker:
    project_name: fastvideo
    run_name: turbo_wan_t2v_lora_sla

  model:
    enable_gradient_checkpointing_type: full

callbacks:
  grad_clip:
    _target_: fastvideo.train.callbacks.grad_clip.GradNormClipCallback
    max_grad_norm: 1.0

  validation:
    _target_: fastvideo.train.callbacks.validation.ValidationCallback
    pipeline_target: fastvideo.pipelines.basic.turbodiffusion.turbodiffusion_pipeline.TurboDiffusionPipeline
    dataset_file: examples/training/finetune/wan_t2v_1.3B/crush_smol/validation.json
    every_steps: 5
    sampling_steps: [4]
    guidance_scale: 1.0

pipeline:
  flow_shift: 3
